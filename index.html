<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste API Tasks e Users</title>
  </head>
  <body>
    <h1>Tasks</h1>

    <h2>Criar tarefa</h2>

    <input id="title" type="text" placeholder="Título" />
    <br /><br />

    <input id="description" type="text" placeholder="Descrição" />
    <br /><br />

    <button onclick="createTask()">Criar</button>

    <hr />

    <h2>Listar todas as tarefas</h2>

    <button onclick="listTasks()">Listar</button>

    <hr />

    <h2>Buscar tarefa</h2>

    <input id="taskId" placeholder="ID da tarefa" />

    <button onclick="getTask()">Buscar</button>

    <hr />

    <h2>Editar tarefa</h2>

    <input id="editId" placeholder="ID da tarefa" />
    <br /><br />

    <input id="editTitle" type="text" placeholder="Novo título" />
    <br /><br />

    <input id="editDescription" type="text" placeholder="Nova descrição" />
    <br /><br />

    <button onclick="updateTask()">Salvar</button>

    <hr />

    <h2>Deletar tarefa</h2>

    <input id="deleteId" placeholder="ID da tarefa" />
    <br /><br />

    <button onclick="deleteTask()">Deletar</button>

    <hr />

    <h1>Users</h1>

    <h2>Criar usuário</h2>

    <input id="userEmail" type="email" placeholder="Email" />
    <br /><br />

    <input id="userPassword" type="password" placeholder="Senha" />
    <br /><br />

    <button onclick="createUser()">Criar usuário</button>

    <hr />

    <h2>Listar todos os usuários</h2>

    <button onclick="listUsers()">Listar usuários</button>

    <hr />

    <h2>Buscar usuário</h2>

    <input id="userId" placeholder="ID do usuário" />
    <br /><br />

    <button onclick="getUser()">Buscar usuário</button>

    <hr />

    <h2>Editar usuário</h2>

    <input id="editUserId" placeholder="ID do usuário" />
    <br /><br />

    <input id="editUserEmail" type="email" placeholder="Novo email" />
    <br /><br />

    <input id="editUserPassword" type="password" placeholder="Nova senha" />
    <br /><br />

    <button onclick="updateUser()">Salvar usuário</button>

    <hr />

    <h2>Deletar usuário</h2>

    <input id="deleteUserId" placeholder="ID do usuário" />
    <br /><br />

    <button onclick="deleteUser()">Deletar usuário</button>

    <hr />

    <h2>Resultado</h2>

    <pre id="result"></pre>

    <script>
      const API_URL = "http://localhost:3000";

      async function createTask() {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;

        try {
          const response = await fetch(`${API_URL}/tasks`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              title,
              description,
            }),
          });

          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function listTasks() {
        try {
          const response = await fetch(`${API_URL}/tasks`);
          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function getTask() {
        const id = document.getElementById("taskId").value;

        try {
          const response = await fetch(`${API_URL}/tasks/${id}`);
          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function updateTask() {
        const id = document.getElementById("editId").value;
        const title = document.getElementById("editTitle").value;
        const description = document.getElementById("editDescription").value;

        try {
          const body = { title };

          if (description) {
            body.description = description;
          }

          const response = await fetch(`${API_URL}/tasks/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body),
          });

          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function deleteTask() {
        const id = document.getElementById("deleteId").value;

        try {
          const response = await fetch(`${API_URL}/tasks/${id}`, {
            method: "DELETE",
          });

          if (response.status === 204) {
            document.getElementById("result").textContent =
              "Tarefa deletada com sucesso.";
          } else {
            const data = await response.json();

            document.getElementById("result").textContent = JSON.stringify(
              data,
              null,
              2,
            );
          }
        } catch (error) {
          console.error(error);
        }
      }

      async function createUser() {
        const email = document.getElementById("userEmail").value;
        const password = document.getElementById("userPassword").value;

        try {
          const response = await fetch(`${API_URL}/users`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function listUsers() {
        try {
          const response = await fetch(`${API_URL}/users`);
          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function getUser() {
        const id = document.getElementById("userId").value;

        try {
          const response = await fetch(`${API_URL}/users/${id}`);
          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function updateUser() {
        const id = document.getElementById("editUserId").value;
        const email = document.getElementById("editUserEmail").value;
        const password = document.getElementById("editUserPassword").value;

        try {
          const response = await fetch(`${API_URL}/users/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          console.error(error);
        }
      }

      async function deleteUser() {
        const id = document.getElementById("deleteUserId").value;

        try {
          const response = await fetch(`${API_URL}/users/${id}`, {
            method: "DELETE",
          });

          if (response.status === 204) {
            document.getElementById("result").textContent =
              "Usuário deletado com sucesso.";
          } else {
            const data = await response.json();

            document.getElementById("result").textContent = JSON.stringify(
              data,
              null,
              2,
            );
          }
        } catch (error) {
          console.error(error);
        }
      }
    </script>
  </body>
</html>
